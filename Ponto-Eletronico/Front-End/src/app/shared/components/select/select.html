<div class="form-group d-flex flex-column gap-2" [class.small]="size === 'small'">
  <label class="fw-medium">{{ label }}</label>

  <select
    class="w-100"
    [value]="value"
    [disabled]="disabled"
    (change)="onSelectChange($event)"
    (blur)="onBlur()"
  >
    <ng-content></ng-content>
  </select>
</div>
