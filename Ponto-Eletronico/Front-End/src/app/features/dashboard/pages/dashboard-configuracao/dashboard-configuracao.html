<app-dashboard-card-filter title="Meu Perfil" subtitle="Visualize suas informações cadastrais.">

    <div card-content>

        <div class="profile-header">

            <div class="profile-avatar">
                <i class="bi bi-person-fill"></i>
            </div>

            <div class="profile-info">

                <h3>{{ nomeUsuario }}</h3>

                <p>
                    {{ emailUsuario }}
                </p>

            </div>

        </div>

        <div class="row g-4 mt-2">

            <div class="col-md-6">

                <div class="profile-item">
                    <label>Nome</label>
                    <span>{{ nomeUsuario }}</span>
                </div>

            </div>

            <div class="col-md-6">

                <div class="profile-item">
                    <label>Email</label>
                    <span>{{ emailUsuario }}</span>
                </div>

            </div>

            <div class="col-md-6">

                <div class="profile-item">
                    <label>Ramal</label>
                    <span>{{ ramalUsuario }}</span>
                </div>

            </div>

            <div class="col-md-6">

                <div class="profile-item">
                    <label>Departamento</label>
                    <span>{{ departamentoUsuario }}</span>
                </div>

            </div>
        </div>

    </div>

</app-dashboard-card-filter>

<br>
<app-dashboard-card-filter title="Alterar Senha" subtitle="Atualize sua senha de acesso.">

    <form [formGroup]="formAlterarSenha" card-content>

        <div class="row g-4">

            <div class="col-md-4">



                <app-input formControlName="senhaAtual" label="Senha Atual"
                    placeholder="Digite sua senha atual" type="password"></app-input>

            </div>

            <div class="col-md-4">



                <app-input formControlName="novaSenha" label="Nova Senha" placeholder="Digite a nova senha"
                    type="password"></app-input>

            </div>

            <div class="col-md-4">


                <app-input formControlName="confirmarSenha" label="Confirmar Senha"
                    placeholder="Confirme a nova senha" type="password"></app-input>

            </div>

        </div>

        <div class="mt-4">

            <app-buttons (buttonClick)="alterarSenha()" variant="add" icon="bi bi-check-circle">

                Salvar Alterações

            </app-buttons>

        </div>

    </form>

</app-dashboard-card-filter>
