<div class="sidebar-wrapper">

  <div
    class="sidebar-backdrop"
    [class.show]="isOpen()"
    (click)="toggleSidebar()">
  </div>

  <aside
    class="sidebar pt-4 px-3 pb-4 position-fixed top-0 start-0 bottom-0 overflow-auto"
    [class.sidebar-hidden]="!isOpen()">

    <div class="pt-2 px-2 pb-4 d-flex align-items-center gap-2">
      <img width="100%" height="100%" src="/images/manpowergruplogo.png" alt="Logo">
    </div>

    @for (group of menu(); track group.title) {

      <p class="nav-label fw-semibold text-uppercase mt-3 mb-2 py-0 px-2">
        {{ group.title }}
      </p>

      <ul class="list-unstyled m-0 p-0 d-flex flex-column gap-1">

        @for (item of group.items; track item.label) {

          <li>

            <a
              class="nav-item px-2 py-2 d-flex align-items-center gap-2 rounded-2 text-decoration-none fw-medium"
              [routerLink]="item.route || null"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="onMenuClick(item)">

              <i [class]="item.icon"></i>

              <span class="flex-grow-1">
                {{ item.label }}
              </span>

            </a>

          </li>

        }

      </ul>

    }

  </aside>

</div>
