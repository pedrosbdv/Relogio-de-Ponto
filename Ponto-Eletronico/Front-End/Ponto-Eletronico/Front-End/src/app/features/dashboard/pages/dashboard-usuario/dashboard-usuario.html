<app-dashboard-card-filter
  title="Controle e Cadastro de Usuários"
  subtitle="Gerencie as informações dos colaboradores internos da empresa."
>
  <ng-container card-filters>
    <form
      class="filters filters-usuario d-grid align-items-end gap-3"
      [formGroup]="form"
    >
      <app-input
        formControlName="nome"
        label="Nome"
        placeholder="Buscar por nome..."
        type="text"
      >
      </app-input>            
            
      <app-select formControlName="departamento" label="Departamento">
        <option value="" selected>Selecione o departamento</option>
        <option value="0">RH</option>
        <option value="1">Financeiro</option>
        <option value="2">TI</option>
        <option value="3">Logística</option>
      </app-select>
      <app-input formControlName="ramal" [maxlength]="4" [apenasNumeros]="true" label="Ramal" placeholder="Ex: 4002" type="text">
      </app-input>
    </form>
  </ng-container>

  <ng-container card-actions>
    <app-buttons variant="search" icon="bi bi-search" (buttonClick)="pesquisarUsuario()"
      >Pesquisar
    </app-buttons>
    <app-buttons variant="add" icon="bi-person-plus" (buttonClick)="addUsuario()">
      Cadastrar Usuário
    </app-buttons>
  </ng-container>

  <app-dashboard-table [columns]="columns" [actions]="{ edit: true }">
    <tr *ngFor="let usuario of (registros$ | async)">
      <td class="py-3 px-4">{{ usuario.nome }}</td>
      <td class="py-3 px-4">{{ usuario.departamentoDescricao  }}</td>
      <td class="py-3 px-4">{{ usuario.ramal }}</td>
      <td class="py-3 px-4">{{ usuario.email }}</td>
      <td class="py-3 px-4">{{ usuario.role }}</td>
      <td class="text-center align-middle">
        <div class="d-flex justify-content-center gap-2">
          <app-buttons variant="edit" icon="bi bi-pencil-square" (buttonClick)="editarUsuario(usuario)"></app-buttons>
          <app-buttons variant="delete" icon="bi bi-trash" (buttonClick)="baixarUsuario(usuario)"></app-buttons>
        </div>
      </td>
    </tr>
  </app-dashboard-table>
</app-dashboard-card-filter>
