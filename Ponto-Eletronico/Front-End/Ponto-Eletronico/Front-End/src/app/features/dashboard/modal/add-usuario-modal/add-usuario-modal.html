<div class="modal-header border-0 pb-0">

    <h5 class="modal-title fw-bold">
        Adicionar Novo Usuário
    </h5>

    <button
        type="button"
        class="btn-close shadow-none"
        (click)="activeModal.dismiss()">
    </button>

</div>

<div class="modal-body">

<form [formGroup]="form">

<div class="row">

    <div class="col-md-6 mb-3">

        <app-input
            formControlName="nome"
            label="Nome *"
            placeholder="Digite o nome"
            size="small"
            type="text">
        </app-input>

    </div>

    <div class="col-md-6 mb-3">

        <app-input
            formControlName="email"
            label="Email *"
            placeholder="usuario@empresa.com"
            size="small"
            type="email">
        </app-input>

    </div>

    <div class="col-md-6 mb-3">

        <app-input
            formControlName="ramal"
            label="Ramal *"
            [maxlength]="4" 
            [apenasNumeros]="true"
            placeholder="4275"
            size="small"
            type="text">
        </app-input>

    </div>

    <div class="col-md-6 mb-3">

        <app-select formControlName="departamento"  valueType="number" label="Departamento *">
            <option value="" selected>Selecione o departamento</option>
            <option value="0">RH</option>
            <option value="1">Financeiro</option>
            <option value="2">TI</option>
            <option value="3">Logística</option>
        </app-select>
    </div>

    <div class="col-md-6 mb-3">

        <app-input
            formControlName="senha"
            label="Senha *"
            placeholder="Digite a senha"
            size="small"
            type="password">
        </app-input>

    </div>

    <div class="col-md-6 mb-3">

        <app-input
            formControlName="confirmarSenha"
            label="Confirmar Senha *"
            placeholder="Confirme a senha"
            size="small"
            type="password">
        </app-input>

    </div>

    <div class="col-12 mb-3">

        <app-select formControlName="role" label="Tipo de Usuário *">
          <option value="" selected>Selecione o tipo de usuário</option>
          <option value="Comum">Comum</option>
          <option value="Admin">Administrador</option>
        </app-select>

    </div>

</div>

</form>

</div>

<div class="modal-footer border-0">



    <app-buttons
        variant="add"
        type="button"
        (click)="cadastrarUsuario()">

        <i class="bi bi-x-circle me-2"></i>

        Salvar Usuário

    </app-buttons>

    <app-buttons
        variant="delete"
        type="button"
        (click)="activeModal.dismiss()">

        <i class="bi bi-x-circle me-2"></i>

        Cancelar

    </app-buttons>



</div>
